name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v0.2.0)'
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      MOD_VERSION: ${{ github.event.inputs.version || github.ref_name }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET 6
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '6.x'

      - name: Inject version
        run: |
          VERSION_NUM="${MOD_VERSION#v}"
          sed -i "s/__VERSION__/$VERSION_NUM/" manifest.json

      - name: Build
        run: |
          mkdir -p /tmp/sdv
          dotnet build -c Release -p:GamePath=/tmp/sdv -p:EnableModDeployer=false

      - name: Package
        run: |
          mkdir -p staging/LudoTrace
          cp bin/Release/net6.0/LudoTrace.dll staging/LudoTrace/
          cp manifest.json                     staging/LudoTrace/
          cp docs/coaching_prompt.md           staging/
          cd staging && zip -r "../LudoTrace-Stardew-${MOD_VERSION}.zip" .

      - name: Create GitHub Release
        id: gh_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.MOD_VERSION }}
          files: LudoTrace-Stardew-${{ env.MOD_VERSION }}.zip
          generate_release_notes: true

      - name: Update CHANGELOG.md
        id: changelog
        run: |
          DATE=$(date -u +%Y-%m-%d)
          NOTES="${{ steps.gh_release.outputs.body }}"

          {
            printf '## %s — %s\n\n' "$MOD_VERSION" "$DATE"
            echo "$NOTES"
            echo ""
            cat CHANGELOG.md 2>/dev/null || true
          } > CHANGELOG.md.tmp
          mv CHANGELOG.md.tmp CHANGELOG.md

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "Update CHANGELOG.md for ${VERSION} [skip ci]"
          git push origin HEAD:main

          echo "entry<<EOF" >> "$GITHUB_OUTPUT"
          printf '## %s — %s\n\n%s\n' "$MOD_VERSION" "$DATE" "$NOTES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Upload to NexusMods
        uses: Nexus-Mods/upload-action@v1.0.0-beta.8
        with:
          api_key: ${{ secrets.NEXUSMODS_API_KEY }}
          game_domain_name: stardewvalley
          mod_id: 48026
          filename: LudoTrace-Stardew-${{ env.MOD_VERSION }}.zip
          version: ${{ env.MOD_VERSION }}
          display_name: LudoTrace Stardew ${{ env.MOD_VERSION }}
          description: ${{ steps.changelog.outputs.entry }}
          archive_existing_version: true
