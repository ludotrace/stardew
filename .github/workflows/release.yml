name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v0.2.0)'
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      VERSION: ${{ github.event.inputs.version || github.ref_name }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build release zip
        run: |
          mkdir -p release_staging/LudoTrace
          cp dist/LudoTrace/LudoTrace.dll release_staging/LudoTrace/
          cp dist/LudoTrace/manifest.json release_staging/LudoTrace/
          cp docs/coaching_prompt.md release_staging/coaching_prompt.md
          cd release_staging && zip -r "../LudoTrace-Stardew-${{ env.VERSION }}.zip" .

      - name: Create GitHub Release
        id: gh_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          files: LudoTrace-Stardew-${{ env.VERSION }}.zip
          generate_release_notes: true

      - name: Update CHANGELOG.md
        id: changelog
        run: |
          VERSION="${{ env.VERSION }}"
          DATE=$(date -u +%Y-%m-%d)
          NOTES="${{ steps.gh_release.outputs.body }}"

          {
            printf '## %s — %s\n\n' "$VERSION" "$DATE"
            echo "$NOTES"
            echo ""
            cat CHANGELOG.md 2>/dev/null || true
          } > CHANGELOG.md.tmp
          mv CHANGELOG.md.tmp CHANGELOG.md

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "Update CHANGELOG.md for $VERSION [skip ci]"
          git push origin HEAD:main

          echo "entry<<EOF" >> "$GITHUB_OUTPUT"
          printf '## %s — %s\n\n%s\n' "$VERSION" "$DATE" "$NOTES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Upload to NexusMods
        uses: Nexus-Mods/upload-action@v1.0.0-beta.8
        with:
          api_key: ${{ secrets.NEXUSMODS_API_KEY }}
          file_id: ${{ vars.NEXUSMODS_GROUP_ID }}
          filename: LudoTrace-Stardew-${{ env.VERSION }}.zip
          version: ${{ env.VERSION }}
          display_name: LudoTrace Stardew ${{ env.VERSION }}
          description: ${{ steps.changelog.outputs.entry }}
          archive_existing_version: true
